<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 260px; font-family: sans-serif; padding: 12px; }
  button { width: 100%; padding: 8px; font-size: 14px; cursor: pointer; }
  #status { margin-top: 8px; font-size: 12px; color: #666; min-height: 16px; }
  #barOuter { margin-top: 6px; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; display: none; }
  #barInner { height: 100%; width: 0%; background: #ff5500; transition: width 0.2s; }
</style>
</head>
<body>
  <button id="extractBtn">ジャケット+音声をZIPで保存</button>
  <div id="status"></div>
  <div id="barOuter"><div id="barInner"></div></div>
  <script src="popup.js"></script>
</body>
</html>
