<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{--bg:#ffffff;--text:#111827;--muted:#6b7280;--accent:#ff6a00;--accent-2:#ff924d;--panel:#ffffff;--panel-border:#e5e7eb;--bar-bg:#f1f5f9;--button-shadow:rgba(17,24,39,0.12);}
  .dark{--bg:#111827;--text:#f8fafc;--muted:#94a3b8;--panel:#1f2937;--panel-border:#374151;--bar-bg:#111827;--button-shadow:rgba(0,0,0,0.32);}
  body { width: 320px; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; padding: 14px; background:var(--bg); color:var(--text); }
  .toolbar { display:flex; gap:10px; align-items:center; justify-content:space-between; }
  .toolbar-meta { display:flex; flex-direction:column; gap:4px; }
  .toolbar-title { font-size:16px; font-weight:700; }
  .toolbar-link { font-size:12px; color:var(--accent); text-decoration:none; }
  .main-action { display:flex; justify-content:center; margin-top:16px; }
  .footer { display:flex; justify-content:flex-end; margin-top:16px; }
  button { flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 12px; font-size:14px; cursor:pointer; border-radius:8px; border:0; background:linear-gradient(180deg,var(--accent),var(--accent-2)); color:#fff; box-shadow:0 6px 16px var(--button-shadow); transition:transform .08s ease; }
  button:active{ transform:translateY(1px) }
  button[disabled]{ opacity:0.7; cursor:default }
  .btn-label{ display:inline-block }
  .spinner{ width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff; animation:spin 0.9s linear infinite; display:none }
  button.loading .spinner{ display:inline-block }
  @keyframes spin{ to{ transform:rotate(360deg) } }

  #status { margin-top:10px; font-size:13px; color:var(--muted); min-height:18px; }
  #barOuter { margin-top:8px;height:8px;background:var(--bar-bg);border-radius:999px;overflow:hidden;display:none }
  #barInner { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#ff9f66); transition:width 0.25s ease; }
  .small-note{ font-size:12px;color:var(--muted);margin-top:8px }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-meta">
      <div class="toolbar-title">SCZip</div>
      <a class="toolbar-link" href="https://github.com/ruka9dx/SCZip" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>
  </div>
  <div class="main-action">
    <button id="extractBtn">
      <span class="spinner" aria-hidden></span>
      <span class="btn-label">ジャケット+音声をZIPで保存</span>
    </button>
  </div>
  <div class="footer">
    <button id="openOptions" style="background:transparent;color:#0b5cff;border:0;padding:4px 8px;font-size:12px;cursor:pointer">設定</button>
  </div>
  <div id="status"></div>
  <div id="barOuter"><div id="barInner"></div></div>
  <div class="small-note">ダウンロードは許可された楽曲のみ実行してください</div>
  <script src="popup.js"></script>
</body>
</html>
