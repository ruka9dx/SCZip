<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{--bg:#ffffff;--muted:#6b7280;--accent:#ff6a00;--accent-2:#ff924d}
  body { width: 320px; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; padding: 14px; background:var(--bg); color:#111; }
  .toolbar { display:flex; gap:10px; align-items:center; }
  button { flex:1; display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 12px; font-size:14px; cursor:pointer; border-radius:8px; border:0; background:linear-gradient(180deg,var(--accent),var(--accent-2)); color:#fff; box-shadow:0 6px 16px rgba(17,24,39,0.12); transition:transform .08s ease; }
  button:active{ transform:translateY(1px) }
  button[disabled]{ opacity:0.7; cursor:default }
  .btn-label{ display:inline-block }
  .spinner{ width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff; animation:spin 0.9s linear infinite; display:none }
  button.loading .spinner{ display:inline-block }
  @keyframes spin{ to{ transform:rotate(360deg) } }

  #status { margin-top:10px; font-size:13px; color:var(--muted); min-height:18px; }
  #barOuter { margin-top:8px;height:8px;background:#f1f5f9;border-radius:999px;overflow:hidden;display:none }
  #barInner { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),#ff9f66); transition:width 0.25s ease; }
  .small-note{ font-size:12px;color:var(--muted);margin-top:8px }
</style>
</head>
<body>
  <div class="toolbar">
    <button id="extractBtn">
      <span class="spinner" aria-hidden></span>
      <span class="btn-label">ジャケット+音声をZIPで保存</span>
    </button>
  </div>
  <div id="status"></div>
  <div id="barOuter"><div id="barInner"></div></div>
  <div class="small-note">ダウンロードは許可された楽曲のみ実行してください</div>
  <script src="popup.js"></script>
</body>
</html>
